name: Build & Deploy (OpenTofu)

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys so two runs can't fight over the OpenTofu state lock.
concurrency:
  group: journal-reminder-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      TF_STATE_BUCKET: journal-reminder-tofu-state-145126693924
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: go test ./...

      - name: Build bootstrap and package zip
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap ./cmd/aws-lambda
          mkdir -p pkg/cmd/aws-lambda
          cp bootstrap pkg/
          printf '%s' "$GOOGLE_CREDENTIALS" > pkg/cmd/aws-lambda/credentials.json
          (cd pkg && zip -r ../dist.zip .)

      - name: Configure AWS credentials
        run: |
          aws configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY }}"
          aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_KEY }}"
          aws configure set region "${AWS_REGION}"

      - uses: opentofu/setup-opentofu@v1

      - name: Tofu init
        working-directory: deploy
        run: tofu init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="region=${AWS_REGION}"

      - name: Tofu apply
        working-directory: deploy
        run: tofu apply -auto-approve
